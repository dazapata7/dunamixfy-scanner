<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icono_xfy.png" />
    <link rel="apple-touch-icon" href="/dunfy_fondo_coscuro.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0afdbd" />
    <style>html,body{background:#0a0a0f}</style>
    <meta name="description" content="Dunamixfy WMS · Sistema de gestión de almacenes y despachos" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Dunamixfy WMS</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Eruda: Consola de depuración móvil (solo en desarrollo) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      // Inicializar Eruda solo en localhost o IPs locales (no en producción)
      if (window.location.hostname === 'localhost' || window.location.hostname.startsWith('192.168.')) {
        eruda.init();
        console.log('🔧 Eruda (consola móvil) inicializada');
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
